<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DocVault — Sign in</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-logo">🗄️ DocVault</div>
    <h1 class="auth-title">Sign in</h1>

    <div th:if="${param.error}" class="alert alert-danger">
        Incorrect username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        You've been signed out.
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" required autofocus placeholder="your username"/>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" required placeholder="••••••••"/>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" name="remember-me" id="remember"/>
            <label for="remember" style="font-size:14px;color:#666">Keep me signed in</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <p class="auth-footer">
        Don't have an account? <a th:href="@{/auth/register}">Create one</a>
    </p>
    <p class="auth-footer auth-home-link">
        <a th:href="@{/}">Back to home</a>
    </p>
</div>
</body>
</html>
