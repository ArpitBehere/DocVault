<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DocVault — Create account</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-logo">🗄️ DocVault</div>
    <h1 class="auth-title">Create account</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-input" required placeholder="Choose a username"/>
            <div th:if="${#fields.hasErrors('username')}" class="field-error" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-input" required placeholder="you@example.com"/>
            <div th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Password <span class="hint">(min 8 characters)</span></label>
            <input type="password" th:field="*{password}" class="form-input" required placeholder="••••••••"/>
            <div th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-footer">
        Already have an account? <a th:href="@{/auth/login}">Sign in</a>
    </p>
    <p class="auth-footer auth-home-link">
        <a th:href="@{/}">Back to home</a>
    </p>
</div>
</body>
</html>
